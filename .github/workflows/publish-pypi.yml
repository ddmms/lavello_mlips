name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    
    # Required for PyPI Trusted Publishing via OIDC
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        
    - name: Build a binary wheel and a source tarball
      run: uv build
      
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # Note: This uses modern Trusted Publishing via OIDC. 
      # No password/token is needed in GitHub Secrets if you configure PyPI to trust this repository.
      # If you prefer a legacy token, you can provide:
      # with:
      #   password: ${{ secrets.PYPI_API_TOKEN }}
