name: Test process_omol25

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin libopenmpi-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov

    - name: Create dummy login file for tests
      run: |
        echo '{"user": "dummy", "access_key": "dummy", "secret_key": "dummy"}' > psdi-argonne-omol25-ro.json

    - name: Run tests with coverage
      env:
        OMPI_MCA_rmaps_base_oversubscribe: 1
        PRTE_MCA_rmaps_base_oversubscribe: 1
      run: |
        pytest tests/
